# Host LiteLLM gateway. Runs next to the GPU; all your host coding clients point
# at 127.0.0.1:4000. See README.md for client wiring and the vLLM/Ollama setup.
#
# SECURITY: use the official Docker image only. The pip wheels litellm==1.82.7 and
# ==1.82.8 (Mar 2026) were a supply-chain compromise; the Docker path was NOT
# affected. Pin to a specific >= 1.83.0 tag below and verify it against the
# releases page (https://github.com/BerriAI/litellm/releases) — don't float `latest`.
services:
  litellm:
    # TODO: pin to a verified release, e.g. ghcr.io/berriai/litellm:v1.83.x-stable
    image: ghcr.io/berriai/litellm:main-stable
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "127.0.0.1:4000:4000"          # host-local only; never expose publicly
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    env_file: .env
    extra_hosts:
      # Lets the container reach host-native vLLM/Ollama at host.docker.internal.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
