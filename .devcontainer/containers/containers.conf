# Rootless Podman/Buildah engine config for the workload. No systemd or journald
# in this container, so don't assume them. See docs/SANDBOX-PLAN.md §12.
[containers]
# Rootless networking: build-time RUN steps egress through the workload's network
# stack — which IS the gateway netns — so package pulls during a build still
# traverse the MITM firewall and obey the allowlist.
netns = "slirp4netns"

[engine]
cgroup_manager = "cgroupfs"
events_logger = "file"
