# Rootless image-build storage for the workload (Podman/Buildah).
# See docs/SANDBOX-PLAN.md §12 (image builds) and devcontainer.Dockerfile.
#
# vfs, not overlay: overlay rootless needs fuse-overlayfs + /dev/fuse, an extra
# device + privilege we deliberately don't grant. vfs needs nothing — it just
# copies layers. Slower and heavier on disk, but it always works under
# cap_drop:ALL + no-new-privileges. graphroot is a per-sandbox named volume
# (persists across rebuilds, isolated from other sandboxes); runroot is tmpfs.
[storage]
driver = "vfs"
runroot = "/tmp/containers-run-1000"
graphroot = "/home/node/.local/share/containers/storage"

[storage.options]
# Single-UID rootless: no /etc/subuid range for node (newuidmap is setuid and
# inert under no-new-privileges), so the build runs with one mapped UID. Layers
# that chown to other UIDs would fail EINVAL — tolerate it instead of aborting.
ignore_chown_errors = "true"
